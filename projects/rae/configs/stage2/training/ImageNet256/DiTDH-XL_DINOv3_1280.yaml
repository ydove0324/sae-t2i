stage_1:
  target: models.rae.stage1.SAE
  params:
    ckpt_path: /opt/tiger/vfm/weights/dinov3/models/ema_vae.pth
    encoder_config_path: /opt/tiger/vfm/models/dinov3-vith16plus-pretrain-lvd1689m
    encoder_input_size: 256
    noise_tau: 0.0
    reshape_to_2d: true
    normalization_stat_path: /opt/tiger/vfm/weights/dinov3/configs/main.yaml
    config_path: /opt/tiger/vfm/models/dino_v3/s16_c1280.yaml
  
stage_2:
  target: models.rae.stage2.models.DDT.DiTwDDTHead
  params:
    input_size: 16
    patch_size: 1
    in_channels: 1280
    hidden_size: [1280, 2048]
    depth: [28, 2]
    num_heads: [16, 16]
    mlp_ratio: 4.0
    class_dropout_prob: 0.1
    num_classes: 1000
    use_qknorm: false
    use_swiglu: true
    use_rope: true
    use_rmsnorm: true
    wo_shift: false
    use_pos_embed: true

transport:
  params:
    path_type: 'Linear'
    prediction: 'velocity'
    loss_weight: null
    time_dist_type: 'uniform'

sampler:
  mode: ODE
  params:
    sampling_method: 'euler'
    num_steps: 50
    atol: 1.0e-6
    rtol: 1.0e-3
    reverse: false

guidance:
  method: 'cfg'
  scale: 1.0
  t_min: 0.0
  t_max: 1.0

misc:
  latent_size: [1280, 16, 16] # [C, H, W]
  num_classes: 1000
  time_dist_shift_dim: 327680 # 16*16*768
  time_dist_shift_base: 4096

training:
  global_seed: 0
  epochs: 1400
  global_batch_size: 128 # change to 512
  grad_accum_steps: 1 # change according to your GPU memory
  ema_decay: 0.9995
  num_workers: 4
  log_every: 100
  ckpt_every: 10000
  sample_every: 2500
  base_lr: 0.0002
  final_lr: 0.00002
  beta: [0.9, 0.95]
  wd: 0.0
  schedule_type: 'linear'
  decay_start_epoch: 40
  decay_end_epoch: 800
  clip_grad: 1.0