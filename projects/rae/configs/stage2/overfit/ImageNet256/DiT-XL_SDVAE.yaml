stage_1:
  target: models.rae.stage1.VAE
  params:
    ckpt: stabilityai/sd-vae-ft-mse
    input_size: 256
    reshape_to_2d: true

stage_2:
  target: models.rae.stage2.models.lightningDiT.LightningDiT
  params:
    input_size: 32
    patch_size: 1
    in_channels: 4
    hidden_size: 1280
    depth: 28
    num_heads: 16
    mlp_ratio: 4.0
    class_dropout_prob: 0.1
    num_classes: 1000
    use_qknorm: false
    use_swiglu: true
    use_rope: true
    use_rmsnorm: true
    wo_shift: false

transport:
  params:
    path_type: 'Linear'
    prediction: 'velocity'
    loss_weight: null
    time_dist_type: 'uniform'

sampler:
  mode: ODE
  params:
    sampling_method: 'euler'
    num_steps: 50
    atol: 1.0e-6
    rtol: 1.0e-3
    reverse: false

guidance:
  method: 'cfg'
  scale: 1.0
  t_min: 0.0
  t_max: 1.0

misc:
  latent_size: [4, 32, 32] # [C, H, W]
  num_classes: 1000
  time_dist_shift_dim: 4096 # 
  time_dist_shift_base: 4096

training:
  global_seed: 0
  epochs: 20000
  global_batch_size: 1
  grad_accum_steps: 1 # change according to your GPU memory
  ema_decay: 0.9995
  num_workers: 4
  log_every: 100
  ckpt_every: 1000000
  sample_every: 100
  base_lr: 0.0002
  final_lr: 0.00002
  beta: [0.9, 0.95]
  wd: 0.0
  schedule_type: 'linear'
  decay_start_epoch: 40
  decay_end_epoch: 800
  clip_grad: 1.0