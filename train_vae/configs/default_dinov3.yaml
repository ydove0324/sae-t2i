# ==================================================
# VAE Training Config - DINOv3 Encoder + ViT-XL Decoder (Only Decoder Training)
# ==================================================
# 参考配置: batch_size=512, 1 epoch = 2500 steps
# 训练阶段:
#   - epoch 0-5  (step 0-14999):     只训练 VAE (L1 + LPIPS)
#   - epoch 6-7  (step 15000-19999): 开始训练判别器 D (stage_disc)
#   - epoch 8-15 (step 20000-39999): VAE + D 联合训练 (stage_joint)

# =================== 数据配置 ===================
data:
  train_path: "/cpfs01/huangxu/ILSVRC/Data/CLS-LOC/train/"
  val_path: "/cpfs01/huangxu/ILSVRC/Data/CLS-LOC/val/"
  image_size: 256
  batch_size: 64  # 单卡 batch_size，8 卡 = 512 global batch

# =================== Encoder 配置 ===================
encoder:
  type: "dinov3"  # "dinov3" 或 "siglip2"
  
  # DINOv3 配置
  dinov3:
    model_dir: "/cpfs01/huangxu/models/dinov3"
    hidden_size: 1280
    patch_size: 16
  
  # SigLIP2 配置 (encoder.type="siglip2" 时生效)
  siglip2:
    model_name: "google/siglip2-base-patch16-256"
    num_tokens: 256
    hidden_size: 768

# =================== Decoder 配置 ===================
decoder:
  type: "vit_decoder"  # 使用 ViT decoder (可选: "cnn_decoder", "vit_decoder")
  out_channels: 3
  latent_channels: 1280   # 匹配 DINOv3 的 hidden size
  target_latent_channels: null
  spatial_downsample_factor: 16
  dropout: 0.0
  gradient_checkpointing: false
  denormalize_output: false
  
  # CNN decoder 配置 (decoder.type="cnn_decoder" 时生效)
  cnn:
    block_out_channels: [1280, 1024, 512, 256, 128]
    layers_per_block: 3
  
  # ViT decoder 配置 (decoder.type="vit_decoder" 时生效)
  vit:
    # ViT-XL 配置 (默认)
    hidden_size: 1024       # XL: 1024, L: 768, B: 512
    num_layers: 24          # XL: 24, L: 16, B: 8
    num_heads: 16           # XL: 16, L: 12, B: 8
    intermediate_size: 4096 # XL: 4096, L: 3072, B: 2048

# =================== VAE 配置 ===================
vae:
  variational: true
  noise_tau: 0.0
  mask_channels: 0.0
  denormalize_decoder_output: true
  skip_to_moments: true

# =================== LoRA 配置 ===================
lora:
  enabled: false  # 禁用 LoRA，只训练 decoder
  rank: 0
  alpha: 0
  dropout: 0.0

# =================== Loss 配置 ===================
loss:
  # 重建损失
  l1_weight: 1.0
  lpips_weight: 1.0
  
  # KL 散度损失
  kl_weight: 1.0e-6
  
  # VF (Visual Feature) 损失 - 禁用（因为没有 LoRA）
  vf:
    enabled: false
    weight: 0.0
    margin_cos: 0.1
    margin_dms: 0.5
    max_tokens: 256
    adaptive_weight: true
  
  # GAN 损失 (DinoDisc)
  # 训练阶段说明 (1 epoch = 2500 steps @ bs=512):
  #   - [0, start_step): 只训练 VAE，不使用 GAN (epoch 0-5)
  #   - [start_step, start_step + stage_disc_steps): 只训练判别器 D (epoch 6-7, stage_disc)
  #   - [start_step + stage_disc_steps, max_steps]: VAE 和 D 联合训练 (epoch 8+, stage_joint)
  gan:
    enabled: true
    weight: 0.75              # GAN loss 权重
    start_step: 15000         # epoch 6 开始启用 GAN (disc. start epoch = 6)
    stage_disc_steps: 5000    # epoch 6-7 单独训练判别器 (2 epochs)，从 epoch 8 开始联合训练
    max_d_weight: 10000.0     # 自适应权重的最大值

# =================== 判别器配置 (DinoDisc) ===================
discriminator:
  # DinoDisc - Dino-S/8 (frozen backbone)
  dino_ckpt_path: "./dino_vit_small_patch8_224.pth"
  recipe: "S_8"           # Dino-S/8 frozen
  ks: 3                   # head 卷积核大小
  norm: "bn"              # 可选: bn, gn
  key_depths: [2, 5, 8, 11]  # 特征提取层深度
  lr: 2.0e-4              # 判别器 max lr (和 decoder 一样)
  # DiffAug 配置
  diffaug_prob: 1.0       # DiffAug 概率
  diffaug_cutout: 0.2     # DiffAug cutout 比例

# =================== 优化器配置 ===================
optimizer:
  # Decoder optimizer (Adam)
  lr: 2.0e-4              # max learning rate
  min_lr: 2.0e-5          # min learning rate (for cosine decay)
  betas: [0.5, 0.9]
  weight_decay: 0.0       # 论文中 weight_decay = 0.0
  warmup_steps: 2500      # warmup 1 epoch (@ bs=512)
  scheduler: "cosine"     # cosine decay

# =================== 训练配置 ===================
training:
  max_steps: 100000        # 16 epochs (@ bs=512, 2500 steps/epoch)
  precision: "bf16"
  fsdp_size: 1

# =================== EMA 配置 ===================
ema:
  enabled: true           # 启用 EMA (Exponential Moving Average)
  decay: 0.9999          # EMA 衰减率
  val_use_ema: true      # 验证时使用 EMA 模型

# =================== 日志和检查点 ===================
logging:
  output_dir: "results_vae/dinov3_vit_decoder_xl"
  log_every: 10
  eval_every: 2000
  save_every: 5000
  val_max_batches: 2000
  debug: true

# =================== 可选: 从检查点恢复 ===================
checkpoint:
  vae_ckpt: "results_vae/dinov3_vit_decoder_xl/step_65000.pth"
