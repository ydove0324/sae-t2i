data:
  train_path: "/cpfs01/huangxu/ILSVRC/Data/CLS-LOC/train/"
  val_path: "/cpfs01/huangxu/ILSVRC/Data/CLS-LOC/val/"
  image_size: 256
  batch_size: 64
  num_workers: 4

encoder:
  type: "qwen3_vit"
  dinov3_model_dir: "/cpfs01/huangxu/models/dinov3"
  siglip2_model_name: "google/siglip2-base-patch16-256"
  dinov2_model_name: "/cpfs01/huangxu/models/dinov2-register-base"
  qwen3_vit_model_name: "/cpfs01/huangxu/models/qwen3vl-8b"

model:
  # Decoder type: "flow_matching" or "vit_decoder"
  decoder_type: "vit_decoder"
  
  # Shared config
  hidden_size: 4096      # Qwen3-VL merger output dim (was 1152 for raw ViT)
  hidden_size_x: 4096    # Qwen3-VL merger output dim (was 1152 for raw ViT)
  
  # Flow matching config (only used when decoder_type="flow_matching")
  num_decoder_blocks: 12
  nerf_max_freqs: 8
  flow_steps: 10
  time_dim: 256
  
  # ViT decoder config (only used when decoder_type="vit_decoder")
  # Available presets: XL (1024, 24, 16, 4096), L (768, 16, 12, 3072), B (512, 8, 8, 2048)
  vit_decoder_hidden_size: 1024
  vit_decoder_num_layers: 24
  vit_decoder_num_heads: 16
  vit_decoder_intermediate_size: 4096
  vit_decoder_dropout: 0.0
  gradient_checkpointing: false
  
  # HF branch config
  enable_hf_branch: false
  hf_dim: 0
  hf_encoder_config_path: null
  hf_dropout_prob: 0.0
  hf_noise_std: 0.0  # sigma sampled per sample from [0, hf_noise_std)
  # Controls alpha in: s_hf' = alpha * s_hf + sigma * eps
  # - "alpha_one": alpha=1, keeps original signal amplitude (default)
  # - "sqrt_1m_sigma2": alpha=sqrt(1-sigma^2), diffusion-style scaling
  hf_noise_alpha_schedule: "alpha_one"
  hf_loss_weight: 0.0
  
  # Latent config
  target_latent_channels: null
  variational: false
  kl_weight: 1.0e-8
  skip_to_moments: true
  
  # Regularization
  noise_tau: 0.0
  random_masking_channel_ratio: 0.0
  denormalize_decoder_output: false
  
  # LoRA (currently not wired for qwen3_vit)
  lora_rank: 0
  lora_alpha: 0
  lora_dropout: 0.0
  enable_lora: false

loss:
  recon_l2_weight: 0.0
  recon_l1_weight: 1.0
  recon_lpips_weight: 1.0
  recon_gan_weight: 0.5

discriminator:
  enabled: true
  disc_type: "dino"  # "dino" | "patchgan"
  lr: 2.0e-4
  start_step: 20000
  weight_decay: 0.0
  betas0: 0.5
  betas1: 0.9
  dino_ckpt_path: "./dino_vit_small_patch8_224.pth"
  recipe: "S_8"
  ks: 3
  norm: "bn"
  key_depths: "2,5,8,11"
  diffaug_prob: 1.0
  diffaug_cutout: 0.2
  ndf: 64
  n_layers: 4

optimizer:
  lr: 2.0e-4
  min_lr: 2.0e-5
  betas0: 0.5
  betas1: 0.9
  weight_decay: 0.0
  warmup_steps: 2500
  scheduler: "cosine"

training:
  max_steps: 120000
  precision: "bf16"
  seed: 42

logging:
  output_dir: "results_sae/qwen3_vit_4096dim_vit_decoder_hf_dim0"
  log_every: 20
  eval_every: 2000
  save_every: 10000
  val_max_batches: 2000
  # debug: true

checkpoint:
  sae_ckpt:
  strict_load: false
