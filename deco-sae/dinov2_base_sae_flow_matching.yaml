data:
  train_path: "/cpfs01/huangxu/ILSVRC/Data/CLS-LOC/train/"
  val_path: "/cpfs01/huangxu/ILSVRC/Data/CLS-LOC/val/"
  image_size: 256
  batch_size: 64
  num_workers: 4

encoder:
  type: "dinov2"
  dinov3_model_dir: "/cpfs01/huangxu/models/dinov3"
  siglip2_model_name: "google/siglip2-base-patch16-256"
  dinov2_model_name: "/cpfs01/huangxu/models/dinov2-register-base"

model:
  hidden_size: 1152
  num_decoder_blocks: 12
  nerf_max_freqs: 8
  flow_steps: 25
  time_dim: 256
  enable_hf_branch: true
  hf_dropout_prob: 0.4
  hf_noise_std: 0.1
  hf_loss_weight: 0.1
  target_latent_channels: null
  variational: false
  kl_weight: 1.0e-8
  skip_to_moments: true
  noise_tau: 0.0
  random_masking_channel_ratio: 0.0
  denormalize_decoder_output: false
  lora_rank: 0
  lora_alpha: 0
  lora_dropout: 0.0
  enable_lora: false

loss:
  recon_l2_weight: 1.0
  recon_l1_weight: 0.0
  recon_lpips_weight: 0.5
  recon_gan_weight: 0.75

discriminator:
  enabled: true
  disc_type: "dino"  # "dino" | "patchgan"
  lr: 2.0e-4
  start_step: 10000
  weight_decay: 0.0
  betas0: 0.5
  betas1: 0.9
  dino_ckpt_path: "./dino_vit_small_patch8_224.pth"
  recipe: "S_8"
  ks: 3
  norm: "bn"
  key_depths: "2,5,8,11"
  diffaug_prob: 1.0
  diffaug_cutout: 0.2
  ndf: 64
  n_layers: 4

optimizer:
  lr: 2.0e-4
  min_lr: 2.0e-5
  betas0: 0.9
  betas1: 0.999
  weight_decay: 0.0
  warmup_steps: 2500
  scheduler: "cosine"

training:
  max_steps: 120000
  precision: "bf16"
  seed: 42

logging:
  output_dir: "results_sae/dinov2_base_flow_matching_hf_pixel_only"
  log_every: 20
  eval_every: 2000
  save_every: 5000
  val_max_batches: 200

checkpoint:
  sae_ckpt: ""
  strict_load: false
