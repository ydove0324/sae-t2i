# DiT-XL config for DECO-SAE (DINOv2-Base + HF branch)
# Latent: 768 (DINOv2) + 64 (HF) = 832 channels

stage_2:
  target: models.rae.stage2.models.DDT.DiTwDDTHead
  params:
    input_size: 16
    patch_size: 1
    in_channels: 1024  # 768 (DINOv2-base) + 64 (HF)
    hidden_size: [1152, 2048]
    depth: [28, 2]
    num_heads: [16, 16]
    mlp_ratio: 4.0
    class_dropout_prob: 0.1
    num_classes: 1000
    use_qknorm: true
    use_swiglu: true
    use_rope: true
    use_rmsnorm: true
    wo_shift: false
    use_pos_embed: true

transport:
  params:
    path_type: 'Linear'
    prediction: 'velocity'
    loss_weight: null
    time_dist_type: 'uniform'

sampler:
  mode: ODE
  params:
    sampling_method: 'euler'
    num_steps: 50
    atol: 1.0e-6
    rtol: 1.0e-3
    reverse: false

guidance:
  method: 'cfg'
  scale: 1.0
  t_min: 0.0
  t_max: 1.0

misc:
  latent_size: [1024, 16, 16]  # [C, H, W] - 768 (DINOv2) + 64 (HF)
  num_classes: 1000
  time_dist_shift_dim: 212992  # 16*16*832
  time_dist_shift_base: 4096

  # Latent normalization from precomputed stats.
  # This path uses .pt stats file generated by compute_latent_stats.py.
  latent_stats_path: "results_sae/dinov2_base_vit_decoder_hf_dim256_dropout0p4_GAN0p5/latent_stats/latent_stats.pt"
  per_channel_norm: true

  # Zero HF mode: when true, HF channels are zeroed during training and evaluation
  # Loss is only computed on semantic channels, HF channels are excluded
  zero_hf_mode: false

  # hf_zero_then_joint mode: first train with zero HF, then switch to joint training
  # at joint_start_step. Supersedes zero_hf_mode when both are true.
  # In joint phase, logs separate semantic/hf loss and grad norms.
  hf_zero_then_joint_mode: true
  joint_start_step: 0

training:
  global_seed: 0
  epochs: 1400
  global_batch_size: 1024
  grad_accum_steps: 1
  ema_decay: 0.9995
  num_workers: 4
  log_every: 100
  balance_every: 10
  ckpt_every: 25000
  sample_every: 1000
  base_lr: 0.0002
  final_lr: 0.00002
  beta: [0.9, 0.95]
  wd: 0.0
  schedule_type: 'linear'
  decay_start_epoch: 40
  decay_end_epoch: 800
  clip_grad: 1.0
# DiT-XL config for DECO-SAE (DINOv2-Base + HF branch)
# Latent: 768 (DINOv2) + 64 (HF) = 832 channels

